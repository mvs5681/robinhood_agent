services:
  agent:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./logs:/app/logs         # telemetry, live_config.json, token file
      - ./data:/app/data         # persists data/history/ across container restarts
    environment:
      - TELEMETRY_LOG_FILE=/app/logs/telemetry.jsonl
      - HISTORY_DIR=/app/data/history
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# Dashboard is exposed via Tailscale instead of a public tunnel — see README/
# setup notes: `tailscale serve https / http://localhost:8080` on the host,
# reachable only from devices on your tailnet.
